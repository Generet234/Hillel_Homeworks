<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/app.js" type="module"></script>
</head>
<body>
<main>
    <div class="container-user">
        <div class="row">
            <form id="formTask">
                <div class="mb-3">
                    <select class="form-select" id ='userSelect' aria-label="Default select example" name="userId">
                        <option value="">Please choose your id user</option>
                        <option value="1">Id one</option>
                        <option value="2">Id two</option>
                        <option value="3">Id three</option>
                        <option value="4">Id four</option>
                        <option value="5">Id five</option>
                        <option value="6">Id six</option>
                        <option value="7">Id seven</option>
                        <option value="8">Id eight</option>
                        <option value="9">Id nine</option>
                        <option value="10">Id ten</option>

                    </select>
                </div>
                </form>
            <form id="formTasksd"></form>
                <div>
                    <select class="form-select" id ='albumSelect' aria-label="Default select example" name="state" >
                        <option value="">Please choose your album</option>
                        <option value="1">Album one</option>
                        <option value="2">Album two</option>
                        <option value="3">Album three</option>
                        <option value="4">Album four</option>
                        <option value="5">Album five</option>
                        <option value="6">Album six</option>
                        <option value="7">Album seven</option>
                        <option value="8">Album eight</option>
                        <option value="9">Album nine</option>
                        <option value="10">Album ten</option>
                    </select>
                </div>
                <div id="status">
                    <p class="loadingUser" hidden>Loading...</p>
                    <p class="loadingAlbum" hidden>Loading albums..</p>
                    <p class="hiddenTextLoading" hidden>Loading photos...</p>
                </div>
                <div>
                    <button type="submit" class="btn btn-success" id="loadBtn" data-submit-button >Load photos</button>
                    <button type="submit" class="btn btn-warning" id="loadMore" data-submit-button >Load more</button>
                </div>
                <div id="photos">
                    <div class="container-photo">
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
