<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/app.js" type="module"></script>
</head>
<body>
<main>
    <h1 class="text-center mt-5 mb-5">TODO LIST</h1>
    <div class="container">
        <div class="row">
            <form id="formTask">
                <div class="mb-3">
                    <label for="inputTitle" class="form-label">Title</label>
                    <input type="text" class="form-control" id="inputTitle" name="title">
                    <div id="emailHelp" class="form-text">Your title needs to be more than 2 symbols.</div>
                </div>
                <div class="mb-3">
                    <select class="form-select" aria-label="Default select example" name="state">
                        <option selected>Open this select menu</option>
                        <option value="work">Work</option>
                        <option value="study">Study</option>
                        <option value="personal">Personal</option>
                    </select>
                </div>
                <div>
                    <button type="submit" class="btn btn-success" data-submit-button>Submit</button>
                    <button type="button" class="btn btn-danger" data-clear-button>Clear All</button>
                </div>
            </form>
            <hr>
            <div id="notesList"></div>
            <hr>
        </div>
    </div>
    <div class="modal" id="myModal">
        <div class="modal-dialog">
                <div class="modal-content">
                    <form id="taskForms">
                    </form>
                </div>
        </div>
    </div>
</main>
</body>
</html>
